<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MusicFlow</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">♪</span>
        <span class="logo-text">MusicFlow</span>
      </div>
      <div class="header-actions">
        <button id="playlistBtn" class="btn-icon" title="My Playlists">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M3 6h15v2H3zm0 4h15v2H3zm0 4h10v2H3zm14 1v6l5-3z"/>
          </svg>
        </button>
        <button id="upnextBtn" class="btn-icon" title="Up Next">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M3 18h13v-2H3v2zm0-5h10v-2H3v2zm0-7v2h13V6H3zm18 9.59L17.42 12 21 8.41 19.59 7l-5 5 5 5L21 15.59z"/>
          </svg>
        </button>
        <button id="lyricsBtn" class="btn-icon" title="Lyrics">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9zm1 14h-2v-6h2v6zm0-8h-2V7h2v2z"/>
          </svg>
        </button>
        <span class="tagline">Ad-Free · No Login</span>
      </div>
    </header>

    <!-- Search -->
    <div class="search-wrap">
      <div class="search-bar">
        <input
          type="text"
          id="searchInput"
          placeholder="Search songs, artists, albums..."
          autocomplete="off"
        />
        <button id="searchBtn" class="btn-icon" title="Search">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </div>
      <!-- Search suggestions dropdown -->
      <ul id="suggestions" class="suggestions hidden"></ul>
    </div>

    <!-- Quick genre chips -->
    <div class="genre-chips">
      <button class="chip active" data-query="top hits 2025">Top Hits</button>
      <button class="chip" data-query="chill lofi music">Lofi</button>
      <button class="chip" data-query="pop music">Pop</button>
      <button class="chip" data-query="hip hop music">Hip-Hop</button>
      <button class="chip" data-query="rock music">Rock</button>
      <button class="chip" data-query="jazz music">Jazz</button>
      <button class="chip" data-query="classical music">Classical</button>
    </div>

    <!-- Main view: results OR playlists OR lyrics -->
    <div class="results-container" id="mainView">
      <div id="loadingSpinner" class="spinner hidden"></div>
      <div id="errorMsg" class="error-msg hidden"></div>
      <ul id="resultsList" class="results-list"></ul>
    </div>

    <!-- Playlists panel -->
    <div class="panel hidden" id="playlistPanel">
      <div class="panel-header">
        <span>My Playlists</span>
        <div class="panel-actions">
          <button id="savePlaylistBtn" class="btn-small-green">+ Save Queue</button>
          <button id="loadUrlBtn" class="btn-small-grey" title="Load from YouTube URL">⬇ URL</button>
          <button id="closePanelBtn" class="btn-icon">✕</button>
        </div>
      </div>
      <!-- URL loader (hidden by default) -->
      <div id="urlLoader" class="url-loader hidden">
        <input id="urlInput" class="url-input" placeholder="Paste YouTube URL or playlist link..." />
        <button id="urlLoadBtn" class="btn-green">Load</button>
      </div>
      <ul id="playlistList" class="playlist-list"></ul>
    </div>

    <!-- Lyrics panel -->
    <div class="panel hidden" id="lyricsPanel">
      <div class="panel-header">
        <span id="lyricsTitle">Lyrics</span>
        <button id="closeLyricsBtn" class="btn-icon">✕</button>
      </div>
      <div id="lyricsContent" class="lyrics-content">
        <div class="lyrics-placeholder">Play a song to see lyrics</div>
      </div>
    </div>

    <!-- Up Next panel -->
    <div class="panel hidden" id="upnextPanel">
      <div class="panel-header">
        <span>Up Next</span>
        <button id="closeUpnextBtn" class="btn-icon">✕</button>
      </div>
      <ul id="upnextList" class="playlist-list"></ul>
    </div>

    <!-- Now Playing Bar -->
    <div class="now-playing" id="nowPlaying">
      <div class="track-info">
        <img id="trackThumb" src="" alt="cover" class="track-thumb" />
        <div class="track-meta">
          <span id="trackTitle" class="track-title">No track selected</span>
          <span id="trackArtist" class="track-artist">—</span>
        </div>
        <button id="addToPlaylistBtn" class="btn-icon btn-add" title="Add to playlist">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
          </svg>
        </button>
      </div>

      <!-- Progress bar -->
      <div class="progress-wrap">
        <span id="currentTime" class="time-label">0:00</span>
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
          <input type="range" id="progressRange" min="0" max="100" value="0" class="progress-range" />
        </div>
        <span id="totalTime" class="time-label">0:00</span>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button id="prevBtn" class="btn-ctrl" title="Previous (←)">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
          </svg>
        </button>
        <button id="playPauseBtn" class="btn-ctrl btn-play" title="Play/Pause (Space)">
          <svg id="playIcon" viewBox="0 0 24 24" width="26" height="26" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
          <svg id="pauseIcon" viewBox="0 0 24 24" width="26" height="26" fill="currentColor" class="hidden">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
          </svg>
        </button>
        <button id="nextBtn" class="btn-ctrl" title="Next (→)">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
          </svg>
        </button>
        <button id="shuffleBtn" class="btn-ctrl btn-small" title="Shuffle">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
            <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17zm4.76-.18l3.15 3.01-3.15 3.01V13h-1.51l-2.09-2.09 1.41-1.41L14 11h.35V9zm-4.76 6.01L5.41 20 4 18.59l5.17-5.17zm9.26-3.83h-2v1.59l-2.09-2.09-1.41 1.41 3.5 3.5 2-1.91V15h2v-4h-2z"/>
          </svg>
        </button>
        <button id="repeatBtn" class="btn-ctrl btn-small" title="Repeat">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
            <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
          </svg>
        </button>
      </div>

      <!-- Volume -->
      <div class="volume-row">
        <button id="muteBtn" class="btn-icon" title="Mute/Unmute (M)">
          <svg id="volIcon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
          </svg>
        </button>
        <div class="volume-slider-wrap">
          <input type="range" id="volumeSlider" min="0" max="100" value="80" class="volume-slider" />
          <div class="volume-fill" id="volumeFill" style="width:80%"></div>
        </div>
        <span id="volumeLabel" class="vol-label">80</span>
        <div class="vol-presets">
          <button class="vol-preset" data-vol="25" title="25%">¼</button>
          <button class="vol-preset" data-vol="50" title="50%">½</button>
          <button class="vol-preset" data-vol="75" title="75%">¾</button>
          <button class="vol-preset" data-vol="100" title="100%">♪</button>
        </div>
      </div>
    </div>

    <!-- Hotkeys hint -->
    <div class="hotkeys-hint">Space · ← → · M &nbsp;|&nbsp; keyboard shortcuts active</div>

  </div>

  <!-- Save playlist modal -->
  <div id="saveModal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-title">Save Playlist</div>
      <input id="playlistNameInput" class="modal-input" placeholder="Playlist name..." maxlength="40" />
      <div class="modal-btns">
        <button id="modalSaveBtn" class="btn-green">Save</button>
        <button id="modalCancelBtn" class="btn-grey">Cancel</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
