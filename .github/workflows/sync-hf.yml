name: Sync to HuggingFace Space

on:
  push:
    branches: ["main"]
    paths:
      - "app.py"
      - "requirements.txt"
      - "Dockerfile"

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push app.py to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # Clone the HF space
          git clone https://Sumit9922:${HF_TOKEN}@huggingface.co/spaces/Sumit9922/musicflow-backend hf-space
          
          # Copy updated files
          cp app.py hf-space/app.py
          cp requirements.txt hf-space/requirements.txt
          cp Dockerfile hf-space/Dockerfile
          
          # Push to HF
          cd hf-space
          git add app.py requirements.txt Dockerfile
          git diff --cached --quiet || git commit -m "Sync from GitHub: $(date '+%Y-%m-%d %H:%M')"
          git push
